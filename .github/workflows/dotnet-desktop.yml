# This workflow will build the GithubActionsDemo project

name: BuildAndPublishTodoWebApp

on:
  push:
    branches:
    - "main"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Install .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Check out this repo
      uses: actions/checkout@v4

    - name: Restore dependencies (install Nuget packages)
      run: dotnet restore

    - name: Build and publish the app
      run: |
        dotnet build --no-restore
        dotnet publish -c Release -o ./publish        

    - name: Upload app artifacts to Github
      uses: actions/upload-artifact@v4
      with:
        name: app-artifacts
        path: ./publish

  deploy:
    runs-on: self-hosted
    needs: build
    permissions:
      contents: read
      packages: read

    steps:
    - name: Download the artifacts from Github (from the build job)
      uses: actions/download-artifact@v4
      with:
        name: app-artifacts

    - name: Stop the application service
      run: |
        sudo systemctl stop GithubActionsTodoApp.service        

    - name: Deploy the the application
      run: |
        sudo rm -Rf /opt/GithubActionsTodoApp || true
        sudo cp -r ${{ github.workspace }}/app-artifacts/ /opt/GithubActionsTodoApp
        sudo chown -R www-data:www-data /opt/GithubActionsTodoApp        

    - name: Start the application service
      run: |
        sudo systemctl start GithubActionsTodoApp.service   